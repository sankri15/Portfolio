<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EShopit</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 4rem auto; background: rgba(255, 255, 255, 0.9); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; }
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; background: #ff3e6c; color: white; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><a href="index.html"><h1>EShopit</h1></a></div>
    </header>

    <main class="auth-container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Forgot Password</h2>
        <form id="forgotForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Send OTP</button>
        </form>
    </main>

    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await api.forgotPassword(email);
                if (res.message) {
                    Swal.fire('Sent!', 'Check your email for the OTP.', 'success').then(() => {
                        window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`;
                    });
                } else {
                    Swal.fire('Error', res.error, 'error');
                }
            } catch(err) {
                Swal.fire('Error', 'Server error', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send OTP';
            }
        });
    </script>
</body>
</html>
