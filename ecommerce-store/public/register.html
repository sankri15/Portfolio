<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your GlowMart account" />
  <title>Register – GlowMart</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

  <!-- Animated background orbs -->
  <div class="hero-bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Auth card -->
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <span>🛍️</span>
      <a href="index.html" class="logo-text">GlowMart</a>
    </div>

    <!-- Heading -->
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join millions of GlowMart shoppers</p>

    <!-- Registration form -->
    <form id="registerForm" novalidate>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          class="form-input"
          placeholder="Sanjana Pal"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Min. 8 characters"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          class="form-input"
          placeholder="Repeat password"
          required
          autocomplete="new-password"
        />
      </div>

      <p class="auth-terms">
        By registering you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
      </p>

      <button
        type="submit"
        class="btn-primary"
        id="registerBtn"
        style="width:100%;"
      >
        ✨ Create My Account
      </button>

    </form>

    <!-- Sign-in link -->
    <p class="auth-link">
      Already have an account? <a href="login.html">Sign In</a>
    </p>

    <!-- Benefits row -->
    <p class="auth-benefits">
      🚚 Free Shipping &nbsp;•&nbsp; 🔄 Easy Returns &nbsp;•&nbsp; 🏅 100% Originals
    </p>

  </div><!-- /.auth-card -->

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm_password').value;
      if (password !== confirm) { alert('Passwords do not match!'); return; }
      const btn = document.getElementById('registerBtn');
      btn.textContent = 'Creating account...';
      btn.disabled = true;
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      try {
        const res = await api.register(name, email, password);
        if (res.message || res.token) {
          alert('Account created! Please sign in.');
          window.location.href = 'login.html';
        } else {
          alert(res.error || 'Registration failed');
          btn.textContent = '✨ Create My Account';
          btn.disabled = false;
        }
      } catch(e) {
        alert('Registration failed. Try again.');
        btn.textContent = '✨ Create My Account';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
